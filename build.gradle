// For Gradle 4.x (OLD version)

apply plugin: 'java'
apply plugin: 'application'

group = 'com.example'
version = '1.0'

repositories {
    mavenCentral()
}

dependencies {
    // Selenium
    implementation 'org.seleniumhq.selenium:selenium-java:4.29.0'

    // JUnit (optional)
    testImplementation 'junit:junit:4.13.2'
}

// IMPORTANT: must match your package + class name
mainClassName = 'com.example.App'
